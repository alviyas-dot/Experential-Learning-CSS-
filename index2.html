<html>
<head>
    <title>Alviya's Portfolio</title>

    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #240046);
            color: white;
        }

       
        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 50px;
            font-weight: 700;
        }

        .hero p {
            margin-top: 10px;
            color: #bbbbbb;
        }

        .hero button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: linear-gradient(45deg, #ff006e, #8338ec);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero button:hover {
            transform: scale(1.05);
        }

        
        section {
            padding: 50px;
            margin: 20px;
            background: rgba(255,255,255,0.07);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .filters {
            text-align: center;
            margin-bottom: 20px;
        }

        .filters input {
            display: none;
        }

        .filters label {
            padding: 10px 20px;
            margin: 5px;
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filters label:hover {
            transform: scale(1.1);
        }

        
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .item {
            overflow: hidden;
            border-radius: 15px;
        }

        .gallery img {
            width: 100%;
            transition: 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        
        #logos:checked ~ .gallery .poster,
        #logos:checked ~ .gallery .social {
            display: none;
        }

        #posters:checked ~ .gallery .logo,
        #posters:checked ~ .gallery .social {
            display: none;
        }

        #all:checked ~ .gallery .item {
            display: block;
        }

       
        .slider {
            overflow: hidden;
        }

        .slides {
            display: flex;
            width: 300%;
            animation: slide 9s infinite;
        }

        .slide {
            width: 100%;
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
        }

        @keyframes slide {
            0% {margin-left: 0;}
            33% {margin-left: -100%;}
            66% {margin-left: -200%;}
        }
        form {
            max-width: 400px;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        
        footer {
            text-align: center;
            padding: 20px;
            color: #bbbbbb;
        }

       
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 30px;
            }
        }

    </style>
</head>

<body>
<div class="hero">
    <h1>Alviya's Designs</h1>
    <p>Creative Graphic Designer | Logos • Posters • Social Media</p>

       <a href="#work">
        <button>View My Work</button>
    </a>
</div>

<section id="work">
    <h2>My Work</h2>

    <div class="filters">
        <input type="radio" name="filter" id="all" checked>
        <label for="all">All</label>

        <input type="radio" name="filter" id="logos">
        <label for="logos">Logos</label>

        <input type="radio" name="filter" id="posters">
        <label for="posters">Posters</label>
    </div>

    <div class="gallery">
        <div class="item logo"><img src="logo1.jpg"></div>
        <div class="item poster"><img src="poster1.jpeg"></div>
        <div class="item social"><img src="social1.jpeg"></div>

        <div class="item logo"><img src="logo2.jpg"></div>
        <div class="item poster"><img src="poster2.jpeg"></div>
        <div class="item social"><img src="social2.jpeg"></div>
    </div>
</section>

<section>
    <h2>Testimonials</h2>

    <div class="slider">
        <div class="slides">
            <div class="slide">"Amazing work!" - Client A</div>
            <div class="slide">"Very professional!" - Client B</div>
            <div class="slide">"Loved the designs!" - Client C</div>
        </div>
    </div>
</section>

<section>
    <h2>Contact Me</h2>

    <form>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>
        <button>Send Message</button>
    </form>
</section>

<footer>
    © 2026 Alviya Designs
</footer>

</body>
</html>
